services:
  - type: web
    name: propie-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /properties
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOY_DATABASE_URL
        sync: false
      - key: DEPLOY_DB_SSL
        value: "true"
      - key: DEPLOY_FRONTEND_ORIGIN
        sync: false
      - key: DEPLOY_JWT_SECRET
        generateValue: true
      - key: DEPLOY_JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: property-images
